<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoFence Alert System — Presentation Deck</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="styles.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="h-full bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans transition-colors duration-300 overflow-hidden">

  <!-- Main Grid Wrapper -->
  <div class="h-full flex flex-col justify-between">

    <!-- Top Navigation Header -->
    <header class="flex items-center justify-between px-6 py-4 border-b border-slate-200 dark:border-slate-900 bg-white/80 dark:bg-slate-950/80 backdrop-blur-sm select-none z-30 slide-header">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl bg-gradient-to-tr from-cyan-500 to-blue-600 flex items-center justify-center shadow-md shadow-cyan-500/10 border border-cyan-400/20">
          <i data-lucide="shield" class="w-5 h-5 text-white"></i>
        </div>
        <div>
          <h1 class="text-sm font-bold font-display tracking-wide uppercase text-slate-900 dark:text-white">GeoFence Alert System</h1>
          <p class="text-[10px] text-slate-500 font-mono">Real-Time POSITIONING & WARNING ENGINE</p>
        </div>
      </div>

      <!-- Action items -->
      <div class="flex items-center gap-2">
        <button id="themeToggle" class="p-2.5 rounded-xl border border-slate-300 dark:border-slate-800 bg-white dark:bg-slate-900/60 hover:bg-slate-50 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors shadow-sm" title="Toggle Dark/Light Mode">
          <i data-lucide="moon" id="themeIcon" class="w-4 h-4"></i>
        </button>
        <button id="exportPdfBtn" class="p-2.5 rounded-xl border border-slate-300 dark:border-slate-800 bg-white dark:bg-slate-900/60 hover:bg-slate-50 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors shadow-sm flex items-center gap-2" title="Print/Export Slide Deck to PDF">
          <i data-lucide="printer" class="w-4 h-4"></i>
          <span class="text-xs font-semibold hidden md:inline">Export PDF</span>
        </button>
        <button id="fullscreenToggle" class="p-2.5 rounded-xl border border-slate-300 dark:border-slate-800 bg-white dark:bg-slate-900/60 hover:bg-slate-50 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors shadow-sm" title="Toggle Fullscreen Mode (F)">
          <i data-lucide="maximize" id="fullscreenIcon" class="w-4 h-4"></i>
        </button>
      </div>
    </header>

    <!-- Main Presentation Stage Container -->
    <div class="flex-1 flex overflow-hidden relative">

      <!-- Left Slide Index Sidebar -->
      <aside id="sidebar" class="w-64 border-r border-slate-200 dark:border-slate-900 bg-white dark:bg-slate-950 flex flex-col justify-between select-none z-20 transition-all duration-300 flex-shrink-0 sidebar-menu">
        <div class="flex-1 overflow-y-auto px-3 py-4 space-y-1 scrollbar-thin">
          <div class="text-[9px] font-mono font-bold tracking-wider text-slate-500 dark:text-slate-600 uppercase px-2.5 mb-2.5">Slide Presentation Index</div>
          <nav id="slideNavList" class="space-y-0.5">
            <!-- Nav buttons generated in app.js -->
          </nav>
        </div>
        <div class="p-3 border-t border-slate-200 dark:border-slate-900 bg-slate-50 dark:bg-slate-950 flex items-center justify-between text-[10px] text-slate-500 font-mono">
          <span>Keyboard: Left/Right/Space</span>
        </div>
      </aside>

      <!-- Collapse Sidebar Toggle Button -->
      <button id="sidebarToggle" class="absolute left-64 top-1/2 -translate-y-1/2 -translate-x-1/2 w-6 h-12 bg-white dark:bg-slate-900 hover:bg-slate-50 dark:hover:bg-slate-800 border border-slate-300 dark:border-slate-800 hover:border-slate-400 dark:hover:border-slate-700 rounded-full flex items-center justify-center text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white z-30 cursor-pointer shadow-lg transition-all duration-300 hover:scale-105" title="Collapse Sidebar Index">
        <i data-lucide="chevron-left" id="sidebarToggleIcon" class="w-4 h-4"></i>
      </button>

      <!-- Slides Output Display Stage -->
      <main class="flex-1 relative overflow-hidden bg-slate-50 dark:bg-slate-950 p-6 md:p-8 flex flex-col justify-center">
        <!-- Background decorative vectors -->
        <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,#1e293b_1px,transparent_1px)] bg-[size:24px_24px] opacity-10 pointer-events-none"></div>
        <div class="absolute -right-32 -bottom-32 w-96 h-96 bg-cyan-500/5 rounded-full blur-3xl pointer-events-none"></div>
        <div class="absolute -left-32 -top-32 w-96 h-96 bg-blue-500/5 rounded-full blur-3xl pointer-events-none"></div>

        <!-- Render Stage -->
        <div id="slideContentStage" class="w-full h-full max-w-6xl mx-auto flex flex-col justify-center opacity-100 transition-opacity duration-300">
          <!-- Slide contents compiled dynamically -->
        </div>
      </main>

    </div>

    <!-- Bottom Navigation Bar Controls -->
    <footer class="flex items-center justify-between px-6 py-4 border-t border-slate-200 dark:border-slate-900 bg-white dark:bg-slate-950 select-none z-30 slide-footer">
      
      <!-- Previous/Next Controls -->
      <div class="flex items-center gap-2">
        <button id="prevBtn" class="flex items-center gap-1.5 px-4.5 py-2.5 rounded-xl border border-slate-300 dark:border-slate-800 bg-white dark:bg-slate-900/60 hover:bg-slate-50 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-300 hover:text-slate-900 dark:hover:text-white font-bold text-xs transition-all disabled:opacity-30 disabled:pointer-events-none cursor-pointer shadow-sm">
          <i data-lucide="arrow-left" class="w-4 h-4"></i> Prev
        </button>
        <button id="nextBtn" class="flex items-center gap-1.5 px-4.5 py-2.5 rounded-xl border border-slate-300 dark:border-slate-800 bg-white dark:bg-slate-900/60 hover:bg-slate-50 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-300 hover:text-slate-900 dark:hover:text-white font-bold text-xs transition-all disabled:opacity-30 disabled:pointer-events-none cursor-pointer shadow-sm">
          Next <i data-lucide="arrow-right" class="w-4 h-4"></i>
        </button>
      </div>

      <!-- Play Slides Autoplay Controls -->
      <div class="flex items-center gap-3">
        <button id="playBtn" class="flex items-center gap-2 px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-800 bg-white dark:bg-slate-900/60 hover:bg-slate-50 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-300 hover:text-slate-900 dark:hover:text-white font-bold text-xs transition-all cursor-pointer shadow-sm">
          <i data-lucide="play" id="playIcon" class="w-3.5 h-3.5"></i>
          <span id="playText">Autoplay</span>
        </button>
        <!-- Slide indicators progress dots -->
        <div id="progressDots" class="hidden lg:flex items-center gap-1.5">
          <!-- Populated in app.js -->
        </div>
      </div>

      <!-- Slides progress metrics -->
      <div class="flex items-center gap-3 text-right">
        <div class="text-xs font-mono text-slate-500 font-bold uppercase tracking-wider">
          Slide <span id="currentSlideNum" class="text-cyan-400">1</span> of <span id="totalSlidesCount">25</span>
        </div>
      </div>

    </footer>

    <!-- Print Slideshow Stage (Strictly for Printing) -->
    <div id="printStage" class="hidden">
      <!-- Full slide list compiled statically here during print generation -->
    </div>

  </div>

  <!-- Script Modules -->
  <script src="app.js"></script>
</body>
</html>
